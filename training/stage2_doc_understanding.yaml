# Stage 2: Document Understanding Fine-tuning
# Learn to understand document content — QA, extraction, table parsing
# Duration: ~3 weeks on 8x A100 80GB

model:
  vision_config:
    hidden_size: 768
    intermediate_size: 3072
    num_hidden_layers: 12
    num_attention_heads: 12
    patch_size: 16
    image_size: 384
  decoder_config:
    hidden_size: 576
    intermediate_size: 1536
    num_hidden_layers: 30
    num_attention_heads: 9
    num_key_value_heads: 3
    vocab_size: 49184
    max_position_embeddings: 8192
    rope_theta: 273000.0
  pixel_shuffle_scale: 3

data:
  manifest_path: "data/synthetic/output/manifest_stage2.jsonl"
  data_root: "data/synthetic"
  max_seq_length: 4096
  stage: 2

training:
  output_dir: "checkpoints/stage2"
  num_epochs: 5
  batch_size: 32
  gradient_accumulation_steps: 8
  learning_rate: 5e-5
  min_learning_rate: 1e-6
  warmup_steps: 500
  weight_decay: 0.01
  max_grad_norm: 1.0
  use_fp16: true
  save_every_steps: 2000
  eval_every_steps: 500
  log_every_steps: 25
  gradient_checkpointing: true
  pretrained_checkpoint: "checkpoints/stage1/best"
