# Stage 3: Instruction Tuning
# Learn to converse about documents — multi-turn, structured output
# Duration: ~1 week on 8x A100 80GB

model:
  vision_config:
    hidden_size: 768
    intermediate_size: 3072
    num_hidden_layers: 12
    num_attention_heads: 12
    patch_size: 16
    image_size: 384
  decoder_config:
    hidden_size: 576
    intermediate_size: 1536
    num_hidden_layers: 30
    num_attention_heads: 9
    num_key_value_heads: 3
    vocab_size: 49184
    max_position_embeddings: 8192
    rope_theta: 273000.0
  pixel_shuffle_scale: 3

data:
  manifest_path: "data/synthetic/output/manifest_stage3.jsonl"
  data_root: "data/synthetic"
  max_seq_length: 8192
  stage: 3

training:
  output_dir: "checkpoints/stage3"
  num_epochs: 3
  batch_size: 16
  gradient_accumulation_steps: 8
  learning_rate: 2e-5
  min_learning_rate: 1e-6
  warmup_steps: 200
  weight_decay: 0.01
  max_grad_norm: 1.0
  use_fp16: true
  save_every_steps: 1000
  eval_every_steps: 500
  log_every_steps: 25
  gradient_checkpointing: true
  pretrained_checkpoint: "checkpoints/stage2/best"
