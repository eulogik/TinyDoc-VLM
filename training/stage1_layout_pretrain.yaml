# Stage 1: Layout Pretraining
# Learn to "see" document structure — layout detection, OCR, region classification
# Duration: ~2 weeks on 8x A100 80GB

model:
  vision_config:
    hidden_size: 768
    intermediate_size: 3072
    num_hidden_layers: 12
    num_attention_heads: 12
    patch_size: 16
    image_size: 384
  decoder_config:
    hidden_size: 576
    intermediate_size: 1536
    num_hidden_layers: 30
    num_attention_heads: 9
    num_key_value_heads: 3
    vocab_size: 49184
    max_position_embeddings: 8192
    rope_theta: 273000.0
  pixel_shuffle_scale: 3

data:
  manifest_path: "data/synthetic/output/manifest.jsonl"
  data_root: "data/synthetic"
  max_seq_length: 2048
  stage: 1

training:
  output_dir: "checkpoints/stage1"
  num_epochs: 3
  batch_size: 64
  gradient_accumulation_steps: 8
  learning_rate: 0.0001
  min_learning_rate: 0.00001
  warmup_steps: 1000
  weight_decay: 0.01
  max_grad_norm: 1.0
  use_fp16: true
  save_every_steps: 5000
  eval_every_steps: 1000
  log_every_steps: 50
  gradient_checkpointing: true
