<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    @page { size: 85.6mm 54mm; margin: 3mm; }
    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        margin: 0; padding: 0;
        color: #1e293b;
        font-size: 8pt;
    }
    .card {
        width: 100%; height: 100%;
        display: flex;
        border: 2px solid #1e3a8a;
        border-radius: 4px;
        overflow: hidden;
    }
    .photo-area {
        width: 35%;
        background: #e0e7ff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24pt;
        color: #6366f1;
        font-weight: bold;
    }
    .info-area {
        width: 65%;
        padding: 8px 10px;
    }
    .card-type {
        font-size: 7pt;
        color: #6366f1;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .name {
        font-size: 12pt;
        font-weight: bold;
        margin: 4px 0;
        color: #1e3a8a;
    }
    .field-row {
        margin: 2px 0;
    }
    .field-label {
        color: #64748b;
        font-size: 6.5pt;
        text-transform: uppercase;
    }
    .field-value {
        font-size: 8pt;
        font-weight: 500;
    }
    .id-number {
        font-family: 'Courier New', monospace;
        font-size: 10pt;
        letter-spacing: 2px;
        color: #1e3a8a;
        margin-top: 4px;
    }
</style>
</head>
<body>
<div class="card">
    <div class="photo-area">
        <div>{{ first_name[0] }}{{ last_name[0] }}</div>
    </div>
    <div class="info-area">
        <div class="card-type">{{ card_type }}</div>
        <div class="name">{{ first_name }} {{ last_name }}</div>
        <div class="field-row"><span class="field-label">DOB</span><br><span class="field-value">{{ date_of_birth }}</span></div>
        <div class="field-row"><span class="field-label">Department</span><br><span class="field-value">{{ department }}</span></div>
        <div class="field-row"><span class="field-label">Expires</span><br><span class="field-value">{{ expiry_date }}</span></div>
        <div class="id-number">#{{ id_number }}</div>
    </div>
</div>
</body>
</html>
